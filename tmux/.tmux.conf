# -----------------------------------------------------------------------------
# PREFIX
# -----------------------------------------------------------------------------
# Change prefix to Ctrl-a (The safest Vim/LazyVim friendly prefix)
unbind C-b
unbind C-Space
set-option -g prefix C-a

# LazyVim uses Ctrl-a to increment numbers. This binding allows you to 
# press 'Ctrl-a' twice to send it through to Neovim if you ever need it.
bind-key C-a send-prefix

# -----------------------------------------------------------------------------
# CORE SETTINGS
# -----------------------------------------------------------------------------
# True color support (Crucial for LazyVim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# Enable mouse support
set -g mouse on

# Fix the famous Vim escape-key delay inside tmux
set -sg escape-time 0

# -----------------------------------------------------------------------------
# NAVIGATION & RESIZING (Conflict-Free)
# -----------------------------------------------------------------------------
# Removed the '-n' (no prefix) flag. You now press Prefix (Ctrl+a) then h/j/k/l
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resizing panes with Prefix + Alt-h/j/k/l
# The '-r' flag means repeatable: you can press Prefix once, then hold Alt and 
# tap j/k/l multiple times without having to press the prefix again!
bind-key -r M-h resize-pane -L 3
bind-key -r M-j resize-pane -D 3
bind-key -r M-k resize-pane -U 3
bind-key -r M-l resize-pane -R 3
